<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Summer Stands - Dashboard</title>
    <style>
        :root {
            --primary: #ffcc00;
            --secondary: #ff6600;
            --dark: #333;
            --light: #f9f9f9;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 2rem;
            background-color: #fafafa;
            color: var(--dark);
            display: none; /* Hidden until password is correct */
        }
        .container { max-width: 1000px; margin: 0 auto; }
        .admin-grid { display: grid; grid-template-columns: 1fr; gap: 20px; }
        
        .card { background: white; padding: 1.5rem; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        table, th, td { border: 1px solid #ddd; }
        th, td { padding: 10px; text-align: left; }
        th { background-color: #f2f2f2; }
        
        .btn { background-color: var(--primary); border: none; padding: 8px 16px; font-weight: bold; border-radius: 5px; cursor: pointer; }
        .status-banner { background: #e0f7fa; padding: 10px; border-radius: 8px; margin-bottom: 20px; text-align: center; font-weight: bold; color: #ff6600; }
    </style>
</head>
<body>

    <script>
        const pass = prompt("Enter Admin Password:");
        if (pass === "@summer2") {
            document.body.style.display = "block";
        } else {
            alert("Wrong password! Access denied.");
            window.location.href = "https://summerstands.github.io/";
        }
    </script>

    <div class="container">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h1>🔐 Summer Stands Administration (Notion Hub)</h1>
            <button class="btn" onclick="fetchNotionOrders()" style="background:#4caf50; color:white;">🔄 Refresh Orders</button>
        </div>
        
        <div class="status-banner" id="sync-status">📡 Fetching live Notion data...</div>

        <div class="card">
            <h3>Earnings Summary</h3>
            <p><strong>Total Revenue:</strong> $<span id="total-revenue">0.00</span></p>
        </div>

        <div class="card">
            <h3>Order Log (From Notion)</h3>
            <table>
                <thead>
                    <tr>
                        <th>Customer</th>
                        <th>Location</th>
                        <th>Items</th>
                        <th>Total Due</th>
                        <th>Status (Click to toggle)</th>
                    </tr>
                </thead>
                <tbody id="admin-orders"></tbody>
            </table>
        </div>
    </div>

    <script>
        const NOTION_TOKEN = "ntn_b71251085285F0zyxLyBuRjvgzBleNjZmfpa40ZxggK9c4";
        const DATABASE_ID = "3a11a8b0873080c8b274fb20867d2b85";
        
        // Notion Endpoint for reading/querying database rows
        const QUERY_URL = "https://corsproxy.io/?" + encodeURIComponent(`https://api.notion.com/v1/databases/${DATABASE_ID}/query`);
        const UPDATE_URL_BASE = "https://corsproxy.io/?" + encodeURIComponent("https://api.notion.com/v1/pages/");

        async function fetchNotionOrders() {
            try {
                const response = await fetch(QUERY_URL, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${NOTION_TOKEN}`,
                        'Notion-Version': '2022-06-28',
                        'Content-Type': 'application/json'
                    }
                });

                if (response.ok) {
                    const data = await response.json();
                    document.getElementById('sync-status').innerText = "🟢 Connected Live to Notion database";
                    document.getElementById('sync-status').style.color = "#4caf50";
                    renderOrders(data.results);
                }
            } catch (e) {
                document.getElementById('sync-status').innerText = "❌ Connection Error";
                console.error(e);
            }
        }

        function renderOrders(notionRows) {
            const orderBody = document.getElementById('admin-orders');
            orderBody.innerHTML = '';
            let totalRev = 0;

            notionRows.forEach(row => {
                const props = row.properties;
                const pageId = row.id;

                // Extract data safely based on Notion data types
                const name = props.Name?.title[0]?.text?.content || "No Name";
                const address = props.Address?.rich_text[0]?.text?.content || "No Address";
                const items = props.Items?.rich_text[0]?.text?.content || "None";
                const totalDue = props["Total Due"]?.number || 0;
                const status = props.Status?.rich_text[0]?.text?.content || "Pending Delivery 🚚";

                totalRev += totalDue;

                orderBody.innerHTML += `
                    <tr>
                        <td><strong>${name}</strong></td>
                        <td>${address}</td>
                        <td>${items}</td>
                        <td>$${totalDue.toFixed(2)}</td>
                        <td>
                            <button onclick="toggleStatus('${pageId}', '${status}')" class="btn" style="font-size:0.85rem;">
                                ${status}
                            </button>
                        </td>
                    </tr>
                `;
            });

            document.getElementById('total-revenue').innerText = totalRev.toFixed(2);
        }

        async function toggleStatus(pageId, currentStatus) {
            const nextStatus = currentStatus.includes('Pending') ? "Completed Paid ✅" : "Pending Delivery 🚚";
            const patchUrl = "https://corsproxy.io/?" + encodeURIComponent(`https://api.notion.com/v1/pages/${pageId}`);

            try {
                await fetch(patchUrl, {
                    method: 'PATCH',
                    headers: {
                        'Authorization': `Bearer ${NOTION_TOKEN}`,
                        'Notion-Version': '2022-06-28',
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        properties: {
                            "Status": { rich_text: [{ text: { content: nextStatus } }] }
                        }
                    })
                });
                fetchNotionOrders();
            } catch (err) {
                alert("Failed to update status.");
            }
        }

        fetchNotionOrders();
        
    </script>
</body>
</html>
