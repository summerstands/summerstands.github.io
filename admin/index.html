<script>
        const DB_URL = "https://kvdb.io/MN9vjH6XpXf7K9L2q8W9Z4/summer_stands_data";

        let standData = {
            inventory: {},
            orders: [],
            totalRevenue: 0,
            totalFees: 0
        };

        async function fetchLiveData() {
            try {
                const response = await fetch(DB_URL);
                if (response.ok) {
                    const text = await response.text();
                    if (text && text.trim().length > 0) {
                        standData = JSON.parse(text);
                    }
                    document.getElementById('sync-status').innerText = "🟢 Automatically Synced to Cloud Storage";
                    renderAdminDashboard();
                }
            } catch (e) {
                document.getElementById('sync-status').innerText = "❌ Database Connection Failed";
                console.error(e);
            }
        }

        async function saveLiveData() {
            try {
                const response = await fetch(DB_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(standData)
                });
                if (!response.ok) {
                    alert(`Error writing to database: Status ${response.status}`);
                } else {
                    fetchLiveData();
                }
            } catch(e) {
                alert("Could not update database. Check your internet connection.");
            }
        }

        function renderAdminDashboard() {
            const invBody = document.getElementById('admin-inventory');
            invBody.innerHTML = '';
            for (let item in standData.inventory) {
                invBody.innerHTML += `
                    <tr>
                        <td><strong>${item}</strong></td>
                        <td><span>${standData.inventory[item].stock}</span></td>
                        <td>
                            <button onclick="changeStock('${item}', 5)">+5</button>
                            <button onclick="changeStock('${item}', -1)">-1</button>
                        </td>
                    </tr>
                `;
            }

            const orderBody = document.getElementById('admin-orders');
            orderBody.innerHTML = '';
            standData.orders.forEach(o => {
                orderBody.innerHTML += `
                    <tr>
                        <td>#00${o.id}</td>
                        <td>${o.name}</td>
                        <td>${o.address}</td>
                        <td>${o.items}</td>
                        <td>$${o.total.toFixed(2)}</td>
                        <td>
                            <button onclick="toggleOrderStatus(${o.id})" class="btn" style="padding:3px 8px; font-size:0.8rem;">
                                ${o.status}
                            </button>
                        </td>
                    </tr>
                `;
            });

            document.getElementById('total-revenue').innerText = standData.totalRevenue.toFixed(2);
            document.getElementById('total-fees').innerText = standData.totalFees.toFixed(2);
            calculateSplits();
        }

        function openOrderModal() {
            document.getElementById('orderModal').style.display = 'flex';
            const listDiv = document.getElementById('modal-items-list');
            listDiv.innerHTML = '';
            for (let item in standData.inventory) {
                listDiv.innerHTML += `
                    <div class="input-group" style="display:flex; justify-content:space-between; align-items:center;">
                        <label>${item} ($${standData.inventory[item].price.toFixed(2)}):</label>
                        <input type="number" id="modal-qty-${item}" min="0" value="0" style="width:60px; text-align:center;">
                    </div>
                `;
            }
        }

        function closeOrderModal() {
            document.getElementById('orderModal').style.display = 'none';
        }

        async function submitNewOrder(e) {
            e.preventDefault();
            const name = document.getElementById('modal-name').value;
            let orderItems = [];
            let itemTotal = 0;

            for (let item in standData.inventory) {
                let qty = parseInt(document.getElementById(`modal-qty-${item}`).value) || 0;
                if (qty > 0) {
                    standData.inventory[item].stock = Math.max(0, standData.inventory[item].stock - qty);
                    orderItems.push(`${item} (${qty})`);
                    itemTotal += qty * standData.inventory[item].price;
                }
            }

            if (orderItems.length === 0) {
                alert("Please add at least 1 item.");
                return;
            }

            standData.totalRevenue += itemTotal;
            standData.orders.push({
                id: standData.orders.length + 1,
                name: name,
                address: "Stand Table",
                items: orderItems.join(', '),
                total: itemTotal,
                status: 'Completed Paid ✅'
            });

            closeOrderModal();
            await saveLiveData();
        }

        async function changeStock(item, amount) {
            standData.inventory[item].stock = Math.max(0, standData.inventory[item].stock + amount);
            await saveLiveData();
        }

        async function toggleOrderStatus(orderId) {
            let order = standData.orders.find(o => o.id === orderId);
            if (order) {
                order.status = order.status.includes('Pending') ? "Completed ✅" : "Pending Delivery 🚚";
                await saveLiveData();
            }
        }

        async function handleManualEntry(e) {
            e.preventDefault();
            const amount = parseFloat(document.getElementById('manual-amount').value);
            const notes = document.getElementById('manual-notes').value;

            standData.totalRevenue += amount;
            standData.orders.push({
                id: standData.orders.length + 1,
                name: "Manual Entry",
                address: "Stand Table",
                items: notes,
                total: amount,
                status: "Completed Paid ✅"
            });

            document.getElementById('manual-amount').value = '';
            document.getElementById('manual-notes').value = '';
            await saveLiveData();
        }

        function calculateSplits() {
            const count = parseInt(document.getElementById('split-count').value) || 1;
            const splitAmount = standData.totalRevenue / count;
            document.getElementById('split-amount').innerText = splitAmount.toFixed(2);
        }

        fetchLiveData();
        setInterval(fetchLiveData, 4000);
    </script>
