<script>
        const DB_URL = "https://kvdb.io/MN9vjH6XpXf7K9L2q8W9Z4/summer_stands_data";

        let standData = {
            inventory: {
                "Lemonade": { price: 1.50, stock: 20 },
                "Oreo Drink": { price: 2.50, stock: 10 },
                "Rose Milk": { price: 2.00, stock: 12 },
                "Chips": { price: 1.00, stock: 15 },
                "Zbar": { price: 1.75, stock: 8 }
            },
            orders: [],
            totalRevenue: 0,
            totalFees: 0
        };

        let cart = {};

        async function fetchLiveData() {
            try {
                const response = await fetch(DB_URL);
                if (response.ok) {
                    const text = await response.text();
                    if (text && text.trim().length > 0) {
                        standData = JSON.parse(text);
                    }
                    document.getElementById('loading-status').innerText = "🟢 Connected Live to Stand Inventory";
                } else {
                    await saveLiveData();
                }
            } catch (e) {
                document.getElementById('loading-status').innerText = "⚠️ Running in offline backup mode";
                console.error("Fetch error:", e);
            }
            renderCustomerMenu();
        }

        async function saveLiveData() {
            try {
                const response = await fetch(DB_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(standData)
                });
                if (!response.ok) {
                    throw new Error(`Server responded with status ${response.status}`);
                }
            } catch(e) {
                console.error("Database save error:", e);
            }
        }

        function renderCustomerMenu() {
            const container = document.getElementById('customer-menu');
            container.innerHTML = '';
            for (let item in standData.inventory) {
                let details = standData.inventory[item];
                container.innerHTML += `
                    <div class="menu-item">
                        <h3>${item}</h3>
                        <p class="price">$${details.price.toFixed(2)}</p>
                        <p class="stock-tag">In Stock: ${details.stock}</p>
                        <button class="btn" onclick="addToCart('${item}')" ${details.stock <= 0 ? 'disabled' : ''}>
                            ${details.stock > 0 ? 'Add to Order' : 'Sold Out'}
                        </button>
                    </div>
                `;
            }
        }

        function addToCart(item) {
            if (!cart[item]) cart[item] = 0;
            if (cart[item] < standData.inventory[item].stock) {
                cart[item]++;
                updateCartUI();
            } else {
                alert(`Sorry, we only have ${standData.inventory[item].stock} left!`);
            }
        }

        function updateCartUI() {
            const summary = document.getElementById('cart-summary');
            const form = document.getElementById('checkout-form');
            const totalSpan = document.getElementById('cart-total');
            
            let html = '<ul>';
            let subtotal = 0;
            let hasItems = false;

            for (let item in cart) {
                if (cart[item] > 0) {
                    hasItems = true;
                    let cost = cart[item] * standData.inventory[item].price;
                    subtotal += cost;
                    html += `<li>${item} x ${cart[item]} - $${cost.toFixed(2)}</li>`;
                }
            }
            html += '</ul>';

            if (hasItems) {
                summary.innerHTML = html;
                form.style.display = 'block';
                totalSpan.innerText = (subtotal + 0.20).toFixed(2);
            } else {
                summary.innerHTML = '<p>No items added yet. Click "Add to Order" above!</p>';
                form.style.display = 'none';
            }
        }

        async function placeOrder(e) {
            e.preventDefault();
            document.getElementById('submit-order-btn').disabled = true;
            document.getElementById('submit-order-btn').innerText = "Sending Order...";

            try {
                const res = await fetch(DB_URL);
                if(res.ok) {
                    const text = await res.text();
                    if (text) standData = JSON.parse(text);
                }
            } catch(err){}

            const name = document.getElementById('cust-name').value;
            const address = document.getElementById('cust-address').value;
            let orderItems = [];
            let itemTotal = 0;

            for (let item in cart) {
                if (cart[item] > 0) {
                    standData.inventory[item].stock = Math.max(0, standData.inventory[item].stock - cart[item]);
                    orderItems.push(`${item} (${cart[item]})`);
                    itemTotal += cart[item] * standData.inventory[item].price;
                }
            }

            let finalBill = itemTotal + 0.20;
            standData.totalRevenue += finalBill;
            standData.totalFees += 0.20;

            standData.orders.push({
                id: standData.orders.length + 1,
                name: name,
                address: address,
                items: orderItems.join(', '),
                total: finalBill,
                status: 'Pending Delivery 🚚'
            });

            try {
                await saveLiveData();
                alert('🎉 Order placed successfully! Sent straight to the database.');
                cart = {};
                document.getElementById('checkout-form').reset();
                updateCartUI();
                renderCustomerMenu();
            } catch (err) {
                alert('⚠️ Order processed, but database failed to save. Please notify the stand owners!');
            }
            
            document.getElementById('submit-order-btn').disabled = false;
            document.getElementById('submit-order-btn').innerText = "Send Order to Stand!";
        }

        fetchLiveData();
    </script>
