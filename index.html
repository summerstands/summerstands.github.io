<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Summer Stands - Bridgeview Lemonade</title>
    <style>
        :root {
            --primary: #ffcc00;
            --secondary: #ff6600;
            --dark: #333;
            --light: #f9f9f9;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #fffdf0;
            color: var(--dark);
        }
        header {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            text-align: center;
            padding: 2rem;
        }
        header h1 { margin: 0; font-size: 2.5rem; text-shadow: 1px 1px 3px rgba(0,0,0,0.2); }
        header p { margin: 5px 0 0; font-size: 1.1rem; }
        
        .container {
            max-width: 1000px;
            margin: 2rem auto;
            padding: 0 1rem;
        }
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 2rem;
        }
        .menu-item {
            background: white;
            border-radius: 12px;
            padding: 1.5rem;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            border: 2px solid #f1f1f1;
        }
        .menu-item h3 { margin: 10px 0; }
        .price { font-weight: bold; color: var(--secondary); font-size: 1.2rem; }
        .stock-tag { font-size: 0.85rem; color: #777; margin-bottom: 10px; }
        
        .btn-group {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 10px;
        }
        
        .btn {
            background-color: var(--primary);
            border: none;
            padding: 8px 16px;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 2px 5px rgba(0,0,0,0.15); }
        .btn:disabled { background-color: #ccc; cursor: not-allowed; transform: none; box-shadow: none; }
        .btn-danger { background-color: #ff4444; color: white; }
        .btn-danger:hover { background-color: #cc3333; }

        .order-section {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .cart-count {
            font-weight: bold;
            font-size: 1.1rem;
            min-width: 30px;
            display: inline-block;
            line-height: 35px;
        }

        .tip-box {
            background: #fff8e1;
            border: 2px dashed #ffcc00;
            padding: 1rem;
            border-radius: 10px;
            margin: 15px 0;
            text-align: center;
        }
        .tip-box p {
            margin: 5px 0 10px 0;
            font-size: 0.95rem;
            color: #555;
        }
        .tip-options {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }
