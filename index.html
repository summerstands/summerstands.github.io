<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Summer Stands - Bridgeview Lemonade</title>
    <style>
        :root {
            --primary: #ffcc00;
            --secondary: #ff6600;
            --dark: #333;
            --light: #f9f9f9;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #fffdf0;
            color: var(--dark);
        }
        header {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            text-align: center;
            padding: 2rem;
        }
        header h1 { margin: 0; font-size: 2.5rem; text-shadow: 1px 1px 3px rgba(0,0,0,0.2); }
        header p { margin: 5px 0 0; font-size: 1.1rem; }
        
        .container {
            max-width: 1000px;
            margin: 2rem auto;
            padding: 0 1rem;
        }
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
        }
        .menu-item {
            background: white;
            border-radius: 12px;
            padding: 1.5rem;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            border: 2px solid #f1f1f1;
        }
        .menu-item h3 { margin: 10px 0; }
        .price { font-weight: bold; color: var(--secondary); font-size: 1.2rem; }
        .stock-tag { font-size: 0.85rem; color: #777; margin-bottom: 10px; }
        
        .btn {
            background-color: var(--primary);
            border: none;
            padding: 8px 16px;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 2px 5px rgba(0,0,0,0.15); }
        .btn:disabled { background-color: #ccc; cursor: not-allowed; }

        .order-section {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            margin-top: 2rem;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
    </style>
</head>
<body>

    <header>
        <h1>Summer Stands</h1>
        <p>Refreshing Bridgeview, One Cup at a Time!</p>
    </header>

    <div class="container">
        <h2>Our Summer Menu</h2>
        <div class="menu-grid" id="customer-menu"></div>

        <div class="order-section">
            <h2>Your Order Details</h2>
            <div id="cart-summary">
                <p>No items added yet. Click "Add to Order" above!</p>
            </div>
            <hr>
            <form id="checkout-form" onsubmit="placeOrder(event)" style="display:none;">
                <p><strong>Delivery Fee:</strong> $2.00</p>
                <p><strong>Total Amount Due:</strong> $<span id="cart-total">0.00</span></p>
                <div style="margin-bottom: 15px;">
                    <label>Your Name: </label><br>
                    <input type="text" id="cust-name" required style="width:100%; padding:8px; margin-top:5px;">
                </div>
                <div style="margin-bottom: 15px;">
                    <label>Bridgeview Address / House Number: </label><br>
                    <input type="text" id="cust-address" required style="width:100%; padding:8px; margin-top:5px;">
                </div>
                <button type="submit" id="submit-order-btn" class="btn" style="background-color: var(--secondary); color: white; width: 100%; padding: 12px;">Send Order to Stand!</button>
            </form>
        </div>
    </div>

    <script>
        // Your Notion Credentials
        const NOTION_TOKEN = "ntn_b71251085285F0zyxLyBuRjvgzBleNjZmfpa40ZxggK9c4";
        const DATABASE_ID = "3a11a8b0873080c8b274fb20867d2b85";
        
        // Free open reverse proxy to handle Notion CORS requirements
        const PROXY_URL = "https://corsproxy.io/?" + encodeURIComponent("https://api.notion.com/v1/pages");

        // Latest prices updated here
        let inventory = {
            "Lemonade": { price: 1.00, stock: 20 },
            "Oreo Milk Shake": { price: 2.00, stock: 10 },
            "Rose Milk": { price: 2.00, stock: 12 },
            "Chips": { price: 1.25, stock: 15 },
            "Zbar": { price: 1.00, stock: 8 }
        };

        let cart = {};

        function renderCustomerMenu() {
            const container = document.getElementById('customer-menu');
            container.innerHTML = '';
            for (let item in inventory) {
                let details = inventory[item];
                container.innerHTML += `
                    <div class="menu-item">
                        <h3>${item}</h3>
                        <p class="price">$${details.price.toFixed(2)}</p>
                        <p class="stock-tag">In Stock: ${details.stock}</p>
                        <button class="btn" onclick="addToCart('${item}')" ${details.stock <= 0 ? 'disabled' : ''}>
                            ${details.stock > 0 ? 'Add to Order' : 'Sold Out'}
                        </button>
                    </div>
                `;
            }
        }

        function addToCart(item) {
            if (!cart[item]) cart[item] = 0;
            if (cart[item] < inventory[item].stock) {
                cart[item]++;
                updateCartUI();
            } else {
                alert(`Sorry, we only have ${inventory[item].stock} left!`);
            }
        }

        function updateCartUI() {
            const summary = document.getElementById('cart-summary');
            const form = document.getElementById('checkout-form');
            const totalSpan = document.getElementById('cart-total');
            
            let html = '<ul>';
            let subtotal = 0;
            let hasItems = false;

            for (let item in cart) {
                if (cart[item] > 0) {
                    hasItems = true;
                    let cost = cart[item] * inventory[item].price;
                    subtotal += cost;
                    html += `<li>${item} x ${cart[item]} - $${cost.toFixed(2)}</li>`;
                }
            }
            html += '</ul>';

            if (hasItems) {
                summary.innerHTML = html;
                form.style.display = 'block';
                totalSpan.innerText = (subtotal + 2.00).toFixed(2);
            } else {
                summary.innerHTML = '<p>No items added yet. Click "Add to Order" above!</p>';
                form.style.display = 'none';
            }
        }

        async function placeOrder(e) {
            e.preventDefault();
            const btn = document.getElementById('submit-order-btn');
            btn.disabled = true;
            btn.innerText = "Sending Order to Notion...";

            const name = document.getElementById('cust-name').value;
            const address = document.getElementById('cust-address').value;
            let orderItems = [];
            let itemTotal = 0;

            for (let item in cart) {
                if (cart[item] > 0) {
                    orderItems.push(`${item} (${cart[item]})`);
                    itemTotal += cart[item] * inventory[item].price;
                }
            }

            let finalBill = itemTotal + 2.00;

            const notionData = {
                parent: { database_id: DATABASE_ID },
                properties: {
                    "Name": { title: [{ text: { content: name } }] },
                    "Address": { rich_text: [{ text: { content: address } }] },
                    "Items": { rich_text: [{ text: { content: orderItems.join(', ') } }] },
                    "Total Due": { number: finalBill },
                    "Status": { rich_text: [{ text: { content: "Pending Delivery 🚚" } }] }
                }
            };

            try {
                const response = await fetch(PROXY_URL, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${NOTION_TOKEN}`,
                        'Notion-Version': '2022-06-28',
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(notionData)
                });

                if (response.ok) {
                    alert('🎉 Order sent successfully! Check your Notion dashboard now!');
                    cart = {};
                    document.getElementById('checkout-form').reset();
                    updateCartUI();
                } else {
                    const errDetails = await response.text();
                    console.error(errDetails);
                    alert('⚠️ Notion rejected the format. Make sure your column names match exactly!');
                }
            } catch (err) {
                console.error(err);
                alert('⚠️ Connection error trying to reach Notion.');
            }
            
            btn.disabled = false;
            btn.innerText = "Send Order to Stand!";
        }

        renderCustomerMenu();
    </script>
</body>
</html>
